<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="void" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <linearGradient id="rift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c83232" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e04848" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3aa8a8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 虚空背景 -->
  <rect width="1920" height="1080" fill="url(#void)"/>
  <!-- 裂隙主线 -->
  <path d="M 200,540 Q 600,300 960,540 T 1720,540" stroke="url(#rift)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8"/>
  <path d="M 150,600 Q 700,400 960,560 T 1770,500" stroke="url(#rift)" stroke-width="1.5" fill="none" filter="url(#glow)" opacity="0.5"/>
  <path d="M 300,480 Q 650,360 950,520 T 1700,580" stroke="url(#rift)" stroke-width="1" fill="none" filter="url(#glow)" opacity="0.4"/>
  <!-- 星点 -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="120" cy="180" r="1"/>
    <circle cx="450" cy="220" r="0.8"/>
    <circle cx="780" cy="120" r="1.2"/>
    <circle cx="1100" cy="200" r="0.9"/>
    <circle cx="1450" cy="160" r="1"/>
    <circle cx="1750" cy="240" r="0.7"/>
    <circle cx="200" cy="850" r="1.1"/>
    <circle cx="550" cy="920" r="0.8"/>
    <circle cx="900" cy="880" r="1"/>
    <circle cx="1280" cy="960" r="0.9"/>
    <circle cx="1620" cy="820" r="1.3"/>
  </g>
</svg>
